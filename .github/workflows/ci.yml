name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      - run: npm run build
        env:
          # `next build` runs with NODE_ENV=production, where SESSION_SECRET
          # is hard-required (see src/lib/env.server.ts) — this is a
          # CI-only placeholder to satisfy that check, not a real secret.
          # A real deployment must set its own SESSION_SECRET via the
          # hosting platform, generated with `openssl rand -base64 32`.
          SESSION_SECRET: ci-build-placeholder-not-a-real-secret-00000000
